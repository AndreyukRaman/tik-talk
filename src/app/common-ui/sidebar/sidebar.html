<img src="/assets/svg/logo-small.png" alt="" class="ml16 mb20">

<nav>
  <ul class="main-menu-list">
    @for (menuItem of menuItems; track menuItem.link) {
      <li>
        <a
          class="menu-item"
          [routerLink]="menuItem.link"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <svg [icon]="menuItem.icon"></svg>
          <span>{{ menuItem.label }}</span>
        </a>
      </li>
    }
  </ul>
</nav>

<p class="medium-text mb20">Followers</p>

<app-subscriber-card></app-subscriber-card>

<div class="mt20 to-subscribers">
  <a [routerLink]="['/subscribers']"  class="to-subscribers-link medium-text">
    All followers
  </a>
  <svg icon="arrow" class="to-subscribers-icon"></svg>
</div>
