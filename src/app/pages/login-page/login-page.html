<form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
  <h1 class="h1 mb60">Sign in</h1>

  <label class="tt-control-label mb16">
    Telegram username
    <input type="text" formControlName="username" placeholder="press Login" class="tt-input">
  </label>

  <label class="tt-control-label mb32">
  <div class="password-input">
    Password
    <input [type]="isPasswordVisible() ? 'text' : 'password'" formControlName="password" placeholder="press Password" class="tt-input">
    <button type="button" class="show-password"
            aria-label="show password"
            [class.active]="isPasswordVisible()"
            (click)="isPasswordVisible.update(v => !v)"></button>
  </div>
  </label>

  <button class="btn btn-shadow" type="submit">Sign In</button>
</form>
<img src="/assets/svg/logo-big.png" alt="logo">
