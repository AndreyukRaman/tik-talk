<img [src]="preview()" class="avatar" alt="">

<div dnd class="dropzone" tabindex="0" (keyup.enter)="fileDrop.click()" (fileDropped)="processFile($event)">

  <div class="dropzone-content">
    <svg icon="upload"></svg>
    <span class="medium-text">Drag and drop image or upload</span>
  </div>

  <input class="avatar-input" tabindex="-1" type="file" #fileDrop (change)="fileBrowserHandler($event)">
</div>
